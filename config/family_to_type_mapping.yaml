# family_to_type_mapping.yaml — 27 SA family → 5 type 完整映射
#
# v14 §1.1 + v13.1 EpistemicSource 完整版

PerceptSA:
  description: "感受器输出"
  attention_budget_share: 0.35
  families:
    - vision_percept
    - audio_percept
    - text_char
    - number_count                # subitize 1-3
    - sensor_salience_hint

VocabSA:
  description: "概念/词汇/范畴"
  attention_budget_share: 0.25
  families:
    - vocab
    - tentative_vocab
    - narrative                   # Phase 10.1
    - causal                      # Phase 10.4
    - hierarchy                   # Phase 10.6
    - anonymous_cluster           # Phase 10.5
    - abstract_vocab              # Phase 11.2

MarkerSA:
  description: "瞬态状态标记(v14.1: cap 20 = documented 17 + reserved 3)"
  attention_budget_share: 0.15
  kinds_documented:
    # Phase 8 marker kinds (5,v14.1 §S1 删 IMAGINATION 重复)
    - NOVELTY
    - TENTATIVE
    - PAIN
    - MISMATCH
    - CORRECTION
    # EpistemicSource (v13/v14.1,5)
    - PERCEIVED
    - IMAGINED                    # v14.1 §S1: 合并 v12 IMAGINATION + v13 IMAGINED
    - HEARSAY
    - REMEMBERED
    - INFERRED
    # Phase 9 marker kinds (5)
    - GAZE
    - JOINT_ATTENTION
    - IMITATION
    - KNOWLEDGE_GAP
    - EMPATHY_RESONANCE
    # Phase 10+ marker kinds (2)
    - TRUST_PROMOTED
    - BOREDOM
  kinds_reserved:
    - SATISFACTION
    - SURPRISE_RESIDUAL
    - SELF_REFERENCE
  # Cap 严格 20 = 17 documented + 3 reserved,加新 kind 必须经设计稿修订协议

EntitySA:
  description: "持久实体"
  attention_budget_share: 0.20
  families:
    - drive                       # Phase 9.1
    - entity_user                 # Phase 9.4
    - self_model                  # Phase 11.5
    - focus                       # Phase 8.7
    - goal                        # Phase 11.3
    - belief_model                # Phase 10.5
    - hypothesis                  # Phase 11.4

ControlSignalSA:
  description: "控制信号"
  attention_budget_share: 0.05
  families:
    - utterance_boundary          # Phase 8.2
    - tick_boundary
    - mode_switch
